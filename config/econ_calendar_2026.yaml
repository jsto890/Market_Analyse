# 2026 US principal federal economic indicator release schedule.
# Source: OMB/OIRA "Schedule of Release Dates for Principal Federal Economic
# Indicators for 2026" (whitehouse.gov PFEI schedule) + federalreserve.gov FOMC
# calendar. All times US Eastern. v1 answers "what is scheduled and when" — no
# actual-vs-forecast (that needs a paid feed). Weekly jobless claims are
# generated by rule (Thursdays) in seed.py, not listed here.
